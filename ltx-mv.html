<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LTX-MV 音频驱动视频 - 范建斌 | ComfyUI AIGC工程师</title>
    <style>
        /* ============================================================
           核心一致性样式：保持紫色调
           ============================================================ */
        :root {
            --primary-accent: #8b5cf6; 
            --secondary-accent: #a78bfa;
            --bg-dark: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --border-glow: rgba(139, 92, 246, 0.3);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Inter", "PingFang SC", system-ui, sans-serif; }

        body {
            background-color: var(--bg-dark);
            color: #f8fafc;
            padding: 40px 20px;
            max-width: 1400px; 
            margin: 0 auto;
            line-height: 1.6;
        }

        .resume-card {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 32px;
            margin-bottom: 40px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
        }

        .resume-card h1 {
            font-size: 32px;
            background: linear-gradient(90deg, var(--primary-accent), var(--secondary-accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 12px;
            font-weight: 800;
        }

        .main-container {
            background: rgba(30, 41, 59, 0.3);
            border-radius: 28px;
            padding: 40px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .section-title {
            font-size: 20px;
            font-weight: 700;
            margin: 40px 0 24px;
            display: flex;
            align-items: center; gap: 12px;
        }

        .section-title::before {
            content: ""; width: 4px; height: 20px; background: var(--primary-accent); border-radius: 10px;
        }

        .workflow-card {
            background: rgba(15, 23, 42, 0.5);
            border-radius: 20px; padding: 24px;
            border: 1px solid var(--border-glow); margin-bottom: 32px;
        }

        .img-display-area {
            width: 100%; border-radius: 12px; background: #000;
            overflow: hidden; cursor: zoom-in; border: 1px solid rgba(255,255,255,0.1);
        }
        .img-display-area img { width: 100%; display: block; }

        .example-item {
            background: rgba(30, 41, 59, 0.4); border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            overflow: hidden; padding: 20px; margin-bottom: 32px;
        }

        .example-header { font-size: 16px; font-weight: 700; color: var(--secondary-accent); margin-bottom: 16px; }

        .media-sequence { display: grid; gap: 20px; }
        .cols-3 { grid-template-columns: repeat(3, 1fr); }

        .media-wrapper {
            position: relative; background: #1e293b; 
            aspect-ratio: 3 / 4; /* 已统一修改为 3:4 */
            border-radius: 12px; overflow: hidden; border: 1px solid rgba(255,255,255,0.05);
            display: flex; align-items: center; justify-content: center;
        }

        .media-label {
            position: absolute; top: 10px; left: 10px;
            background: rgba(15, 23, 42, 0.8); color: #fff;
            padding: 4px 10px; border-radius: 6px; font-size: 11px;
            font-weight: 700; z-index: 10; backdrop-filter: blur(4px);
        }

        .media-content { width: 100%; height: 100%; object-fit: cover; cursor: zoom-in; }
        .audio-player { width: 90%; filter: invert(1) hue-rotate(180deg); } /* 音频适配暗色 */

        .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
        .back-btn {
            display: inline-flex; align-items: center; gap: 8px; padding: 10px 24px;
            border-radius: 50px; text-decoration: none; font-weight: 600; font-size: 14px;
            transition: 0.3s; cursor: pointer;
            background: rgba(255, 255, 255, 0.05); color: var(--secondary-accent); border: 1px solid var(--border-glow);
        }
        .back-btn:hover { background: var(--primary-accent); color: #fff; }

        .img-preview-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(20px); display: none; align-items: center; justify-content: center; z-index: 9999; }
        .img-preview-modal.active { display: flex; }
        .modal-media { max-width: 95%; max-height: 90%; object-fit: contain; border-radius: 8px; }

        @media (max-width: 1024px) {
            .media-sequence { grid-template-columns: 1fr !important; }
        }
    </style>
</head>
<body>
    <div class="resume-card">
        <h1>范建斌 | ComfyUI AIGC工程师</h1>
        <p class="base-info">28岁 | 广州 | 计算机技术硕士 | LTX-Video MV 专项工作流</p>
        <hr style="border:none; border-top:1px solid rgba(255,255,255,0.1); margin:20px 0;">
        <ul style="list-style:none; font-size:14px; color:#cbd5e1; display:flex; gap:20px; flex-wrap:wrap;">
            <li>🎵 精准音频同步 (Audio-Visual Sync)</li>
            <li>👄 实时口型对齐 (Lip-Sync Realism)</li>
            <li>🎸 节奏感应律动 (Rhythmic Motion)</li>
        </ul>
    </div>

    <div class="main-container">
        <div class="page-header">
            <a href="index.html" class="back-btn">← 返回首页</a>
            <h2 style="font-size: 28px; font-weight: 700;">音频驱动 / LTX-MV</h2>
        </div>

        <h3 class="section-title">核心模块：LTX-MV 音频驱动视频工作流</h3>
        <div class="workflow-card">
            <div class="img-display-area" onclick="showModal('workflow/ltx-mv/workflow_main.png', false)">
                <img src="workflow/ltx-mv/workflow_main.png" alt="LTX MV Workflow" onerror="this.src='https://placehold.co/1200x600/1e293b/64748b?text=Place+workflow_main.png+in+folder'">
            </div>
        </div>

        <div id="sections-container"></div>
    </div>

    <footer style="text-align:center; color:#64748b; font-size:14px; padding:48px;">© 2026 范建斌 | ComfyUI AIGC工程师 | 广州</footer>

    <div class="img-preview-modal" id="modal" onclick="closeModal()">
        <img id="modalImg" src="" class="modal-media" style="display:none;">
        <video id="modalVideo" controls autoplay loop class="modal-media" style="display:none;"></video>
    </div>

    <script>
        const basePath = 'workflow/ltx-mv/';

        const sectionsData = [
            {
                title: "板块一：语音驱动口型 (Voice-to-Lip Sync)",
                items: [
                    { 
                        id: 'l1', cols: 'cols-3', title: '示例 01：写实人物解说', 
                        files: ['l1_input.png', 'l1_audio.flac', 'l1_res.mp4'], 
                        labels: ['IMAGE | 静态人物', 'AUDIO | 语音输入', 'VIDEO | 口型合成'] 
                    },
                    { 
                        id: 'l2', cols: 'cols-3', title: '示例 02：古风角色献唱', 
                        files: ['l2_input.png', 'l2_audio.flac', 'l2_res.mp4'], 
                        labels: ['IMAGE | 国风原画', 'AUDIO | 歌曲片段', 'VIDEO | 情感对口型'] 
                    }
                ]
            },
            {
                title: "板块二：情感与氛围表现 (Emotional Expression)",
                items: [
                    { 
                        id: 'e1', cols: 'cols-3', title: '示例 01：电影级情感特写', 
                        files: ['e1_input.png', 'e1_audio.flac', 'e1_res.mp4'], 
                        labels: ['IMAGE | 特写镜头', 'AUDIO | 独白', 'VIDEO | 微表情同步'] 
                    }
                ]
            }
        ];

        function renderContent() {
            const container = document.getElementById('sections-container');
            sectionsData.forEach(section => {
                const secTitle = document.createElement('h3');
                secTitle.className = 'section-title';
                secTitle.innerText = section.title;
                container.appendChild(secTitle);

                const grid = document.createElement('div');
                grid.className = 'example-grid';

                section.items.forEach(item => {
                    let mediaHtml = '';
                    item.files.forEach((file, index) => {
                        const fullPath = basePath + file;
                        const label = item.labels[index];
                        const isVideo = file.endsWith('.mp4') || file.endsWith('.webm');
                        const isAudio = file.endsWith('.mp3') || file.endsWith('.wav') || file.endsWith('.flac');
                        const labelStyle = isVideo ? 'background:linear-gradient(90deg, var(--primary-accent), var(--secondary-accent))' : '';

                        let contentHtml = '';
                        if (isVideo) {
                            contentHtml = `<video src="${fullPath}" class="media-content" autoplay loop muted playsinline onclick="showModal('${fullPath}', true)"></video>`;
                        } else if (isAudio) {
                            contentHtml = `<audio src="${fullPath}" controls class="audio-player"></audio>`;
                        } else {
                            // 占位图同步修改为 300x400 以匹配 3:4 比例
                            contentHtml = `<img src="${fullPath}" class="media-content" onclick="showModal('${fullPath}', false)" onerror="this.src='https://placehold.co/300x400/1e293b/475569?text=Missing+File'">`;
                        }

                        mediaHtml += `
                            <div class="media-wrapper">
                                <span class="media-label" style="${labelStyle}">${label}</span>
                                ${contentHtml}
                            </div>
                        `;
                    });

                    grid.innerHTML += `
                        <div class="example-item">
                            <div class="example-header">${item.title}</div>
                            <div class="media-sequence ${item.cols}">${mediaHtml}</div>
                        </div>
                    `;
                });
                container.appendChild(grid);
            });
        }

        function showModal(url, isVideo) {
            const modal = document.getElementById('modal');
            const mImg = document.getElementById('modalImg');
            const mVideo = document.getElementById('modalVideo');
            if (isVideo) {
                mImg.style.display = "none"; mVideo.style.display = "block"; mVideo.src = url;
            } else {
                mVideo.style.display = "none"; mImg.style.display = "block"; mImg.src = url;
            }
            modal.classList.add('active');
        }

        function closeModal() {
            const modal = document.getElementById('modal');
            const v = document.getElementById('modalVideo');
            modal.classList.remove('active');
            v.pause(); v.src = "";
        }

        window.addEventListener('DOMContentLoaded', renderContent);
    </script>
</body>
</html>
