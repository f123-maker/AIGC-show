<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LTX-Video 高时序一致 I2V - 范建斌 | ComfyUI AIGC工程师</title>
    <style>
        /* ============================================================
           核心一致性样式：保持不变
           ============================================================ */
        :root {
            --primary-accent: #f59e0b; 
            --secondary-accent: #fbbf24;
            --bg-dark: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --border-glow: rgba(245, 158, 11, 0.3);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Inter", "PingFang SC", system-ui, sans-serif; }

        body {
            background-color: var(--bg-dark);
            color: #f8fafc;
            padding: 40px 20px;
            max-width: 1400px; 
            margin: 0 auto;
            line-height: 1.6;
        }

        .resume-card {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 32px;
            margin-bottom: 40px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
        }

        .resume-card h1 {
            font-size: 32px;
            background: linear-gradient(90deg, var(--primary-accent), var(--secondary-accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 12px;
            font-weight: 800;
        }

        .main-container {
            background: rgba(30, 41, 59, 0.3);
            border-radius: 28px;
            padding: 40px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .section-title {
            font-size: 20px;
            font-weight: 700;
            margin: 40px 0 24px;
            display: flex;
            align-items: center; gap: 12px;
        }

        .section-title::before {
            content: ""; width: 4px; height: 20px; background: var(--primary-accent); border-radius: 10px;
        }

        .workflow-card {
            background: rgba(15, 23, 42, 0.5);
            border-radius: 20px; padding: 24px;
            border: 1px solid var(--border-glow); margin-bottom: 32px;
        }

        .img-display-area {
            width: 100%; border-radius: 12px; background: #000;
            overflow: hidden; cursor: zoom-in; border: 1px solid rgba(255,255,255,0.1);
        }
        .img-display-area img { width: 100%; display: block; }

        .example-item {
            background: rgba(30, 41, 59, 0.4); border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            overflow: hidden; padding: 20px; margin-bottom: 32px;
        }

        .example-header { font-size: 16px; font-weight: 700; color: var(--primary-accent); margin-bottom: 16px; }

        .media-sequence { display: grid; gap: 20px; }
        .cols-2 { grid-template-columns: repeat(2, 1fr); }
        .cols-3 { grid-template-columns: repeat(3, 1fr); }
        .cols-4 { grid-template-columns: repeat(4, 1fr); }

        .media-wrapper {
            position: relative; background: #1e293b; aspect-ratio: 16 / 9;
            border-radius: 12px; overflow: hidden; border: 1px solid rgba(255,255,255,0.05);
        }

        .media-label {
            position: absolute; top: 10px; left: 10px;
            background: rgba(15, 23, 42, 0.8); color: #fff;
            padding: 4px 10px; border-radius: 6px; font-size: 11px;
            font-weight: 700; z-index: 10; backdrop-filter: blur(4px);
        }

        .media-content { width: 100%; height: 100%; object-fit: cover; cursor: zoom-in; }

        .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
        .back-btn {
            display: inline-flex; align-items: center; gap: 8px; padding: 10px 24px;
            border-radius: 50px; text-decoration: none; font-weight: 600; font-size: 14px;
            transition: 0.3s; cursor: pointer;
            background: rgba(255, 255, 255, 0.05); color: var(--secondary-accent); border: 1px solid var(--border-glow);
        }
        .back-btn:hover { background: var(--primary-accent); color: #fff; }

        .img-preview-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(20px); display: none; align-items: center; justify-content: center; z-index: 9999; }
        .img-preview-modal.active { display: flex; }
        .modal-media { max-width: 95%; max-height: 90%; object-fit: contain; border-radius: 8px; }

        @media (max-width: 1024px) {
            .media-sequence { grid-template-columns: 1fr !important; }
        }
    </style>
</head>
<body>
    <div class="resume-card">
        <h1>范建斌 | ComfyUI AIGC工程师</h1>
        <p class="base-info">28岁 | 广州 | 计算机技术硕士 | LTX-Video 2.3 专项工作流</p>
        <hr style="border:none; border-top:1px solid rgba(255,255,255,0.1); margin:20px 0;">
        <ul style="list-style:none; font-size:14px; color:#cbd5e1; display:flex; gap:20px; flex-wrap:wrap;">
            <li>⚡ 极速生成体验 (Turbo Inference)</li>
            <li>🌀 高时序一致性 (Temporal Consistency)</li>
            <li>🎨 循环动效与无缝衔接 (Seamless Loops)</li>
        </ul>
    </div>

    <div class="main-container">
        <div class="page-header">
            <a href="index.html" class="back-btn">← 返回首页</a>
            <h2 style="font-size: 28px; font-weight: 700;">视频生成 / LTX-I2V</h2>
        </div>

        <h3 class="section-title">核心模块：LTX-Video 2.3 I2V 工作流</h3>
        <div class="workflow-card">
            <div class="img-display-area" onclick="showModal('workflow/ltx-i2v/workflow_main.png', false)">
                <img src="workflow/ltx-i2v/workflow_main.png" alt="LTX Workflow" onerror="this.src='https://placehold.co/1200x600/1e293b/64748b?text=Place+workflow_main.png+in+folder'">
            </div>
        </div>

        <div id="sections-container"></div>
    </div>

    <footer style="text-align:center; color:#64748b; font-size:14px; padding:48px;">© 2026 范建斌 | ComfyUI AIGC工程师 | 广州</footer>

    <div class="img-preview-modal" id="modal" onclick="closeModal()">
        <img id="modalImg" src="" class="modal-media" style="display:none;">
        <video id="modalVideo" controls autoplay loop class="modal-media" style="display:none;"></video>
    </div>

    <script>
        const basePath = 'workflow/ltx-i2v/';

        const sectionsData = [
            {
                title: "板块一：单张图生视频 (Single Image to Video)",
                items: [
                    { id: 's1', cols: 'cols-2', title: '示例 01：高动态人物动作', files: ['s1_input.png', 's1_res.mp4'], labels: ['IMAGE | 输入图', 'VIDEO | 生成结果'] },
                    { id: 's2', cols: 'cols-2', title: '示例 02：人物特写展现', files: ['s2_input.png', 's2_res.mp4'], labels: ['IMAGE | 设计图', 'VIDEO | 生长效果'] },
                    { id: 's3', cols: 'cols-2', title: '示例 03：电商产品动态展示', files: ['s3_input.png', 's3_res.mp4'], labels: ['IMAGE | 产品图', 'VIDEO | 运镜展示'] }
                ]
            },
            {
                title: "板块二：首尾帧控制 (Start & End Frame Control)",
                items: [
                    { id: 'k1', cols: 'cols-3', title: '示例 01：无缝循环背景动效', files: ['k1_start.png', 'k1_end.png', 'k1_res.mp4'], labels: ['START | 首帧', 'END | 尾帧', 'VIDEO | 循环结果'] },
                    { id: 'k2', cols: 'cols-3', title: '示例 02：视角平滑转换/变焦', files: ['k2_start.png', 'k2_end.png', 'k2_res.mp4'], labels: ['START | 全景', 'END | 特写', 'VIDEO | 推进效果'] },
                    { id: 'k3', cols: 'cols-3', title: '示例 03：材质/季节属性变换', files: ['k3_start.png', 'k3_end.png', 'k3_res.mp4'], labels: ['START | 夏季', 'END | 冬季', 'VIDEO | 演变过程'] }
                ]
            },
            {
                title: "板块三：多帧与分镜引导 (Multi-frame & Storyboard)",
                items: [
                    { id: 'm1', cols: 'cols-4', title: '示例 01：三帧时序引导', files: ['m1_f1.png', 'm1_f2.png', 'm1_f3.png', 'm1_res.mp4'], labels: ['FRAME 1', 'FRAME 2', 'FRAME 3', 'VIDEO | 生成结果'] },
                    // 四宫格分镜三个示例
                    { id: 'm2', cols: 'cols-2', title: '示例 02：四宫格分镜转视频 (A)', files: ['m2_input.png', 'm2_res.mp4'], labels: ['IMAGE | 4宫格输入', 'VIDEO | 生成结果'] },
                    { id: 'm3', cols: 'cols-2', title: '示例 03：四宫格分镜转视频 (B)', files: ['m3_input.png', 'm3_res.mp4'], labels: ['IMAGE | 4宫格输入', 'VIDEO | 生成结果'] },
                    { id: 'm4', cols: 'cols-2', title: '示例 04：四宫格分镜转视频 (C)', files: ['m4_input.png', 'm4_res.mp4'], labels: ['IMAGE | 4宫格输入', 'VIDEO | 生成结果'] }
                ]
            }
        ];

        function renderContent() {
            const container = document.getElementById('sections-container');
            sectionsData.forEach(section => {
                const secTitle = document.createElement('h3');
                secTitle.className = 'section-title';
                secTitle.innerText = section.title;
                container.appendChild(secTitle);

                const grid = document.createElement('div');
                grid.className = 'example-grid';

                section.items.forEach(item => {
                    let mediaHtml = '';
                    item.files.forEach((file, index) => {
                        const isVideo = file.endsWith('.mp4') || file.endsWith('.webm');
                        const fullPath = basePath + file;
                        const label = item.labels[index];
                        const labelStyle = isVideo ? 'background:linear-gradient(90deg, #f59e0b, #fbbf24)' : '';

                        mediaHtml += `
                            <div class="media-wrapper">
                                <span class="media-label" style="${labelStyle}">${label}</span>
                                ${isVideo ? 
                                    `<video src="${fullPath}" class="media-content" autoplay loop muted playsinline onclick="showModal('${fullPath}', true)"></video>` : 
                                    `<img src="${fullPath}" class="media-content" onclick="showModal('${fullPath}', false)" onerror="this.src='https://placehold.co/400x225/1e293b/475569?text=Missing+File'">`
                                }
                            </div>
                        `;
                    });

                    grid.innerHTML += `
                        <div class="example-item">
                            <div class="example-header">${item.title}</div>
                            <div class="media-sequence ${item.cols}">${mediaHtml}</div>
                        </div>
                    `;
                });
                container.appendChild(grid);
            });
        }

        function showModal(url, isVideo) {
            const modal = document.getElementById('modal');
            const mImg = document.getElementById('modalImg');
            const mVideo = document.getElementById('modalVideo');
            if (isVideo) {
                mImg.style.display = "none"; mVideo.style.display = "block"; mVideo.src = url;
            } else {
                mVideo.style.display = "none"; mImg.style.display = "block"; mImg.src = url;
            }
            modal.classList.add('active');
        }

        function closeModal() {
            const modal = document.getElementById('modal');
            const v = document.getElementById('modalVideo');
            modal.classList.remove('active');
            v.pause(); v.src = "";
        }

        window.addEventListener('DOMContentLoaded', renderContent);
    </script>
</body>
</html>
